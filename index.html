<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MeetMind — AI Meeting Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3d;
      --accent: #7c6dfa;
      --accent2: #fa6d9a;
      --accent3: #6dfacc;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --glow: rgba(124, 109, 250, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(124,109,250,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(124,109,250,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
    .orb1 { width: 400px; height: 400px; background: rgba(124,109,250,0.08); top: -100px; right: -100px; }
    .orb2 { width: 300px; height: 300px; background: rgba(250,109,154,0.06); bottom: 100px; left: -100px; }
    .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    header { text-align: center; margin-bottom: 48px; animation: fadeUp 0.6s ease both; }
    .logo { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; letter-spacing: -2px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .tagline { color: var(--muted); font-size: 13px; margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }
    .api-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; margin-bottom: 24px; animation: fadeUp 0.6s 0.1s ease both; }
    .api-section label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 10px; }
    .api-row { display: flex; gap: 10px; }
    .api-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .api-input:focus { border-color: var(--accent); }
    .api-input::placeholder { color: var(--muted); }
    .btn-save { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 10px 20px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:active { transform: scale(0.97); }
    .api-hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
